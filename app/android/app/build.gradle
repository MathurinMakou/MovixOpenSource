apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    autolinkLibrariesWithApp()
}

def keystorePropertiesFile = rootProject.file("app/keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.movix.app"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.movix.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 12
        versionName "2.5.3"

        buildConfigField "int", "VERSION_CODE_INT", "${versionCode}"
        buildConfigField "String", "VERSION_NAME_STR", "\"${versionName}\""
    }

    buildFeatures {
        buildConfig true
    }

    signingConfigs {
        release {
            if (keystoreProperties['MOVIX_RELEASE_STORE_FILE']) {
                storeFile file(keystoreProperties['MOVIX_RELEASE_STORE_FILE'])
                storePassword keystoreProperties['MOVIX_RELEASE_STORE_PASSWORD']
                keyAlias keystoreProperties['MOVIX_RELEASE_KEY_ALIAS']
                keyPassword keystoreProperties['MOVIX_RELEASE_KEY_PASSWORD']
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig keystoreProperties['MOVIX_RELEASE_STORE_FILE'] ? signingConfigs.release : signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // Google Cast (Chromecast) — see app/src/main/java/com/movix/app/cast/
    implementation("com.google.android.gms:play-services-cast-framework:21.5.0")
    implementation("androidx.mediarouter:mediarouter:1.7.0")
}

// androidx.legacy:legacy-support-core-utils:1.0.0 (tiré transitivement par
// mediarouter → palette) embarque ses propres classes androidx.autofill.R$attr
// qui entrent en collision avec le module androidx.autofill:autofill:1.1.0
// utilisé par appcompat → "duplicate class" au mergeDexRelease.
configurations.all {
    exclude group: 'androidx.legacy', module: 'legacy-support-core-utils'
}
